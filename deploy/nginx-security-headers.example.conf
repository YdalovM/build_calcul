# Пример для Nginx: вставить в server { ... }, если CDN/хост не читает out/_headers.
# Перезагрузить nginx. Строка CSP должна совпадать с public/_headers (и с Яндекс.Метрикой).

add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; frame-src 'self' https://mc.yandex.ru; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://yastatic.net; connect-src 'self' https:; object-src 'none'; form-action 'self'; upgrade-insecure-requests" always;
